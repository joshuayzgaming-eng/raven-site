<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAVEN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Helvetica Neue", Arial, sans-serif;
}

body{
background:#000;
color:white;
height:200vh;
overflow-x:hidden;
}

/* background glow */

.glow{
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
filter:blur(80px);
animation:pulse 6s infinite alternate;
z-index:-1;
}

@keyframes pulse{
0%{opacity:.2; transform:translate(-50%,-50%) scale(.9);}
100%{opacity:.4; transform:translate(-50%,-50%) scale(1.1);}
}

/* center content */

.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
font-size:48px;
letter-spacing:12px;
margin-bottom:30px;
opacity:0;
transform:translateY(20px);
transition:1.2s;
}

.tagline{
font-size:18px;
letter-spacing:3px;
opacity:.7;
margin-bottom:40px;
opacity:0;
transform:translateY(20px);
transition:1.2s;
}

.timer{
font-size:42px;
letter-spacing:6px;
margin-bottom:20px;
opacity:0;
transform:translateY(20px);
transition:1.2s;
}

.sub{
font-size:14px;
opacity:.5;
letter-spacing:2px;
opacity:0;
transform:translateY(20px);
transition:1.2s;
}

/* scroll reveal */

.show{
opacity:1;
transform:translateY(0);
}

/* grain texture */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:.05;
pointer-events:none;
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="logo reveal">RAVEN</div>

<div class="tagline reveal">
1 JACKET.<br>
NO RESTOCK.
</div>

<div class="timer reveal" id="countdown">
04:00:00
</div>

<div class="sub reveal">
LOCKED. RELEASING SOON.<br>
STAY TUNED.
</div>

</div>


<script>

/* 4 hour timer */

let time = 4 * 60 * 60;

const countdown = document.getElementById("countdown");

function updateTimer(){

let hours = Math.floor(time / 3600);
let minutes = Math.floor((time % 3600) / 60);
let seconds = time % 60;

countdown.innerHTML =
String(hours).padStart(2,'0') + ":" +
String(minutes).padStart(2,'0') + ":" +
String(seconds).padStart(2,'0');

time--;

if(time < 0){
countdown.innerHTML = "UNLOCKED";
}

}

setInterval(updateTimer,1000);


/* scroll reveal */

const reveals = document.querySelectorAll(".reveal");

function reveal(){

reveals.forEach(el=>{
let windowHeight = window.innerHeight;
let top = el.getBoundingClientRect().top;

if(top < windowHeight - 60){
el.classList.add("show");
}

})

}

window.addEventListener("scroll", reveal);
window.addEventListener("load", reveal);

</script>

</body>
</html>
