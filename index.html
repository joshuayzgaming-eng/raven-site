<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FALLENRAVEN™</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Helvetica,Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* cursor glow */

.cursor-glow{
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 70%);
pointer-events:none;
transform:translate(-50%,-50%);
filter:blur(80px);
z-index:-1;
}

/* parallax background */

.parallax{
position:fixed;
width:120%;
height:120%;
background:radial-gradient(circle at center,#111 0%,#000 60%);
top:-10%;
left:-10%;
z-index:-2;
}

/* container */

.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

/* brand */

.logo{
font-size:48px;
letter-spacing:12px;
margin-bottom:30px;
}

/* glitch effect */

.glitch{
position:relative;
font-size:20px;
letter-spacing:4px;
opacity:.8;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
width:100%;
overflow:hidden;
}

.glitch::before{
animation:glitch1 2s infinite linear alternate-reverse;
color:#aaa;
}

.glitch::after{
animation:glitch2 2s infinite linear alternate-reverse;
color:#555;
}

@keyframes glitch1{
0%{clip-path:inset(0 0 80% 0);}
100%{clip-path:inset(60% 0 0 0);}
}

@keyframes glitch2{
0%{clip-path:inset(40% 0 40% 0);}
100%{clip-path:inset(10% 0 70% 0);}
}

/* timer */

.timer{
font-size:44px;
letter-spacing:6px;
margin-top:40px;
}

/* email capture */

.email-box{
margin-top:40px;
display:flex;
gap:10px;
}

.email-box input{
background:#111;
border:1px solid #333;
padding:10px 15px;
color:white;
outline:none;
}

.email-box button{
background:white;
color:black;
border:none;
padding:10px 18px;
cursor:pointer;
font-weight:bold;
}

/* silhouette */

.silhouette{
width:260px;
height:360px;
background:linear-gradient(180deg,#222,#000);
margin-top:120px;
filter:blur(8px);
opacity:.4;
transition:1.5s;
}

.silhouette.reveal{
filter:blur(0);
opacity:1;
transform:scale(1.05);
}

/* grain */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:.05;
pointer-events:none;
}

</style>
</head>

<body>

<div class="cursor-glow" id="cursorGlow"></div>
<div class="parallax" id="parallax"></div>

<section class="section">

<div class="logo">FALLENRAVEN™</div>

<div class="glitch" data-text="1 JACKET. NO RESTOCK.">
1 JACKET. NO RESTOCK.
</div>

<div class="timer" id="countdown">
LOADING
</div>

<div class="email-box">
<input placeholder="enter email">
<button>notify</button>
</div>

</section>

<section class="section">

<div class="glitch" data-text="THE FIRST DROP">
THE FIRST DROP
</div>

<div class="silhouette" id="silhouette"></div>

<p style="opacity:.6;margin-top:20px;letter-spacing:3px">
LOCKED. RELEASING SOON.
</p>

</section>


<script>

/* GLOBAL DROP TIME */

const dropDate = new Date("2026-03-10T22:00:00Z").getTime();
const countdown = document.getElementById("countdown");

function updateTimer(){

const now = new Date().getTime();
const distance = dropDate - now;

if(distance <= 0){
countdown.innerHTML = "UNLOCKED";
return;
}

const h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((distance%(1000*60*60))/(1000*60));
const s = Math.floor((distance%(1000*60))/1000);

countdown.innerHTML =
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

setInterval(updateTimer,1000);
updateTimer();

/* cursor glow */

const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove", e=>{
glow.style.left = e.clientX+"px";
glow.style.top = e.clientY+"px";
});

/* parallax */

const parallax = document.getElementById("parallax");

window.addEventListener("scroll", ()=>{
const scroll = window.scrollY;
parallax.style.transform = "translateY("+scroll*0.2+"px)";
});

/* silhouette reveal */

const silhouette = document.getElementById("silhouette");

window.addEventListener("scroll", ()=>{
const pos = silhouette.getBoundingClientRect().top;
if(pos < window.innerHeight - 100){
silhouette.classList.add("reveal");
}
});

</script>

</body>
</html>
