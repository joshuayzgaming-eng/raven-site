<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FALLENRAVEN™</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Helvetica,Arial,sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
  perspective:1px;
}

/* JACKET BACKGROUND */
.jacket-bg{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:min(900px, 90vw);
  opacity:.08;
  filter:contrast(120%) brightness(120%);
  z-index:-2;
  pointer-events:none;
}

/* CURSOR GLOW */
.cursor-glow{
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  filter:blur(80px);
  z-index:-1;
}

/* PAGE */
.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
}

/* LOGO */
.logo{
  font-size:clamp(32px, 7vw, 52px);
  letter-spacing:0.25em;
  margin-bottom:24px;
}

/* GLITCH TEXT */
.glitch{
  position:relative;
  font-size:clamp(14px, 3vw, 20px);
  letter-spacing:0.3em;
  opacity:.85;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  width:100%;
  overflow:hidden;
}

.glitch::before{
  animation:glitch1 2s infinite linear alternate-reverse;
  color:#888;
}

.glitch::after{
  animation:glitch2 2s infinite linear alternate-reverse;
  color:#444;
}

@keyframes glitch1{
  0%{clip-path:inset(0 0 80% 0);}
  100%{clip-path:inset(60% 0 0 0);}
}

@keyframes glitch2{
  0%{clip-path:inset(40% 0 40% 0);}
  100%{clip-path:inset(10% 0 70% 0);}
}

/* TIMER */
.timer{
  font-size:clamp(28px, 7vw, 48px);
  letter-spacing:0.12em;
  margin-top:36px;
}

.drop-label{
  margin-top:12px;
  font-size:12px;
  letter-spacing:0.25em;
  opacity:.5;
}

/* EMAIL */
.email-box{
  margin-top:40px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.email-box input{
  background:#111;
  border:1px solid #333;
  padding:12px 16px;
  color:white;
  outline:none;
  min-width:260px;
}

.email-box input:focus{
  border-color:#777;
}

.email-box button{
  background:white;
  color:black;
  border:none;
  padding:12px 20px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.email-box button:hover{
  background:#ddd;
}

.email-note{
  margin-top:14px;
  font-size:12px;
  letter-spacing:0.18em;
  opacity:.45;
}

/* GRAIN */
body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:.05;
  pointer-events:none;
}

/* MOBILE */
@media (max-width: 640px){
  .cursor-glow{
    width:280px;
    height:280px;
    filter:blur(60px);
  }

  .email-box{
    width:100%;
  }

  .email-box input,
  .email-box button{
    width:100%;
  }
}
</style>
</head>

<body>

<img src="jacket.png" alt="" class="jacket-bg" />

<div class="cursor-glow" id="cursorGlow"></div>

<section class="section">
  <div class="logo">FALLENRAVEN™</div>

  <div class="glitch" data-text="FIRST DROP">
    FIRST DROP
  </div>

  <div class="timer" id="countdown">LOADING</div>
  <div class="drop-label">DROP GOES LIVE 22:00 UTC</div>

  <form
    class="email-box"
    action="https://formspree.io/f/YOURID"
    method="POST"
  >
    <input
      type="email"
      name="email"
      placeholder="enter email"
      autocomplete="email"
      required
    />

    <button type="submit">notify</button>
  </form>

  <div class="email-note">JOIN THE LIST FOR EARLY ACCESS</div>
</section>

<script>
const dropDate = new Date("2026-03-10T22:00:00Z").getTime();
const countdown = document.getElementById("countdown");

function updateTimer() {
  const now = Date.now();
  const distance = dropDate - now;

  if (distance <= 0) {
    countdown.textContent = "UNLOCKED";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  countdown.textContent =
    String(days).padStart(2, "0") + "D " +
    String(hours).padStart(2, "0") + ":" +
    String(minutes).padStart(2, "0") + ":" +
    String(seconds).padStart(2, "0");
}

setInterval(updateTimer, 1000);
updateTimer();

const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove", (e) => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
