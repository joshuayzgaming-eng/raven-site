<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FALLENRAVEN™</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Helvetica,Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
perspective:1px;
}

/* JACKET BACKGROUND */

.jacket-bg{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:900px;
opacity:.08;
filter:contrast(120%) brightness(120%);
z-index:-2;
pointer-events:none;
}

/* CURSOR GLOW */

.cursor-glow{
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(255,255,255,0.12),transparent 70%);
pointer-events:none;
transform:translate(-50%,-50%);
filter:blur(80px);
z-index:-1;
}

/* PAGE */

.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

/* LOGO */

.logo{
font-size:52px;
letter-spacing:14px;
margin-bottom:30px;
}

/* GLITCH TEXT */

.glitch{
position:relative;
font-size:20px;
letter-spacing:4px;
opacity:.85;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
width:100%;
overflow:hidden;
}

.glitch::before{
animation:glitch1 2s infinite linear alternate-reverse;
color:#888;
}

.glitch::after{
animation:glitch2 2s infinite linear alternate-reverse;
color:#444;
}

@keyframes glitch1{
0%{clip-path:inset(0 0 80% 0);}
100%{clip-path:inset(60% 0 0 0);}
}

@keyframes glitch2{
0%{clip-path:inset(40% 0 40% 0);}
100%{clip-path:inset(10% 0 70% 0);}
}

/* TIMER */

.timer{
font-size:48px;
letter-spacing:6px;
margin-top:40px;
}

/* EMAIL */

.email-box{
margin-top:40px;
display:flex;
gap:10px;
}

.email-box input{
background:#111;
border:1px solid #333;
padding:12px 16px;
color:white;
outline:none;
}

.email-box button{
background:white;
color:black;
border:none;
padding:12px 20px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.email-box button:hover{
background:#ddd;
}

/* GRAIN */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:.05;
pointer-events:none;
}

</style>
</head>

<body>

<img src="jacket.png" class="jacket-bg">

<div class="cursor-glow" id="cursorGlow"></div>

<section class="section">

<div class="logo">FALLENRAVEN™</div>

<div class="glitch" data-text="FIRST DROP">
FIRST DROP
</div>

<div class="timer" id="countdown">
LOADING
</div>

<form class="email-box"
action="https://formspree.io/f/YOURID"
method="POST">

<input
type="email"
name="email"
placeholder="enter email"
required>

<button type="submit">
notify
</button>

</form>

</section>

<script>

/* GLOBAL DROP TIME */

const dropDate = new Date("2026-03-10T22:00:00Z").getTime();
const countdown = document.getElementById("countdown");

function updateTimer(){

const now = new Date().getTime();
const distance = dropDate - now;

if(distance <= 0){
countdown.innerHTML = "UNLOCKED";
return;
}

const h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((distance%(1000*60*60))/(1000*60));
const s = Math.floor((distance%(1000*60))/1000);

countdown.innerHTML =
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

setInterval(updateTimer,1000);
updateTimer();

/* CURSOR GLOW */

const glow = document.getElementById("cursorGlow");

document.addEventListener("mousemove", e=>{
glow.style.left = e.clientX+"px";
glow.style.top = e.clientY+"px";
});

</script>

</body>
</html>
